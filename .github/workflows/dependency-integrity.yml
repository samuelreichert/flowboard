name: Dependency Integrity

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dependency-integrity-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  npm-ci:
    name: npm ci (Node 24.18.0 / npm 11.16.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24.18.0
          cache: npm

      - run: npm ci
